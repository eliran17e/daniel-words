services:
  db:
    image: postgres:15-alpine
    container_name: daniel_words_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-daniel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-daniel}
      POSTGRES_DB: ${POSTGRES_DB:-daniel_words}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-daniel} -d ${POSTGRES_DB:-daniel_words}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: daniel_words_backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-daniel}:${POSTGRES_PASSWORD:-daniel}@db:5432/${POSTGRES_DB:-daniel_words}
      PYTHONUNBUFFERED: "1"
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
      HF_HOME: /root/.cache/huggingface
      PIXABAY_API_KEY: ${PIXABAY_API_KEY:-}
    volumes:
      - ./backend:/app
      - whisper_models:/root/.cache/huggingface
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: daniel_words_frontend
    restart: unless-stopped
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      REACT_APP_API_BASE: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
  whisper_models:
